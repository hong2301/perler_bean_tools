name: Release Please

on:
  push:
    branches:
      - master
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: google-github-actions/release-please-action@v4
        with:
          release-type: simple
          package-name: your-package-name
          changelog-types: |
            [
              {"type":"feat","section":"✨ 新功能","hidden":false},
              {"type":"fix","section":"🐛 Bug修复","hidden":false},
              {"type":"docs","section":"📝 文档更新","hidden":false},
              {"type":"style","section":"💄 样式调整","hidden":false},
              {"type":"refactor","section":"♻️ 代码重构","hidden":false},
              {"type":"perf","section":"⚡ 性能优化","hidden":false},
              {"type":"test","section":"✅ 测试","hidden":false},
              {"type":"chore","section":"🔧 构建/工具","hidden":false}
            ]