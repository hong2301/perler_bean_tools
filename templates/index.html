<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘慧专属拼豆工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .icon {
            font-size: 1.3em;
        }

        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f2ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
            color: #667eea;
        }

        .upload-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-area {
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .result-count {
            font-size: 1.1em;
            color: #666;
        }

        .result-count span {
            color: #667eea;
            font-weight: bold;
            font-size: 1.3em;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 500;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8f9ff;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .query-section {
            margin-top: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .input-field {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
        }

        .query-result {
            display: none;
            margin-top: 20px;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 20px;
            font-size: 0.9em;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 刘慧专属拼豆工具</h1>
            <p>上传图片自动识别颜色，快速查询色盘信息</p>
        </div>

        <!-- 图片上传区域 -->
        <div class="card">
            <div class="card-title">
                <span class="icon">📷</span>
                图片识别
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击或拖拽上传图片</div>
                <div class="upload-hint">支持 JPG、PNG 格式</div>
                <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg">
            </div>

            <div class="loading" id="loadingArea">
                <div class="spinner"></div>
                <p>正在识别图片，请稍候...</p>
            </div>

            <div class="alert alert-error" id="errorArea" style="display: none;"></div>

            <div class="result-area" id="resultArea">
                <div class="result-header">
                    <div class="result-count">共识别到 <span id="colorCount">0</span> 种颜色</div>
                    <a href="#" class="btn btn-primary" id="downloadBtn">⬇️ 下载 CSV</a>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>颜色编号</th>
                                <th>色盘</th>
                                <th>数量</th>
                                <th>颜色名称</th>
                            </tr>
                        </thead>
                        <tbody id="resultTable">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 查询工具区域 -->
        <div class="card">
            <div class="card-title">
                <span class="icon">🔍</span>
                色盘查询工具
            </div>

            <div class="query-section">
                <div class="input-group">
                    <input type="text" class="input-field" id="queryInput"
                        placeholder="输入颜色编号，用空格分隔（如：E4 r1 f5）">
                    <button class="btn btn-primary" onclick="queryColors()">查询</button>
                </div>

                <div class="query-result" id="queryResult">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>颜色编号</th>
                                    <th>色盘号</th>
                                </tr>
                            </thead>
                            <tbody id="queryTable">
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="empty-state" id="queryEmpty">
                    <div class="empty-state-icon">🎨</div>
                    <p>输入颜色编号，快速查询所属色盘</p>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>刘慧专属拼豆工具 © 2024</p>
        </div>
    </div>

    <script>
        // 上传区域相关
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loadingArea = document.getElementById('loadingArea');
        const resultArea = document.getElementById('resultArea');
        const errorArea = document.getElementById('errorArea');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('请上传图片文件');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            // 显示加载状态
            uploadArea.style.display = 'none';
            loadingArea.style.display = 'block';
            resultArea.style.display = 'none';
            errorArea.style.display = 'none';

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loadingArea.style.display = 'none';

                if (data.success) {
                    showResult(data);
                } else {
                    showError(data.error || '识别失败');
                    uploadArea.style.display = 'block';
                }
            })
            .catch(error => {
                loadingArea.style.display = 'none';
                uploadArea.style.display = 'block';
                showError('网络错误，请重试');
                console.error(error);
            });
        }

        function showResult(data) {
            resultArea.style.display = 'block';
            document.getElementById('colorCount').textContent = data.data.length;

            const tbody = document.getElementById('resultTable');
            tbody.innerHTML = '';

            data.data.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${row[0]}</strong></td>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>${row[3]}</td>
                `;
                tbody.appendChild(tr);
            });

            // 设置下载链接
            document.getElementById('downloadBtn').href = data.csv_url;
        }

        function showError(message) {
            errorArea.textContent = message;
            errorArea.style.display = 'block';
        }

        // 查询功能
        function queryColors() {
            const input = document.getElementById('queryInput').value.trim();

            if (!input) {
                return;
            }

            fetch('/query', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ colors: input })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showQueryResult(data.results);
                }
            })
            .catch(error => {
                console.error(error);
            });
        }

        function showQueryResult(results) {
            document.getElementById('queryEmpty').style.display = 'none';
            document.getElementById('queryResult').style.display = 'block';

            const tbody = document.getElementById('queryTable');
            tbody.innerHTML = '';

            results.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${item.color}</strong></td>
                    <td>${item.plate}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 回车键触发查询
        document.getElementById('queryInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                queryColors();
            }
        });
    </script>
</body>
</html>
